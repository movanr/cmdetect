table:
  name: criteria_assessment
  schema: public
object_relationships:
  - name: assessor
    using:
      foreign_key_constraint_on: assessed_by
  - name: organization
    using:
      foreign_key_constraint_on: organization_id
  - name: patient_record
    using:
      foreign_key_constraint_on: patient_record_id
insert_permissions:
  - role: org_admin
    permission:
      check: {}
      set:
        organization_id: x-hasura-Organization-Id
      columns:
        - patient_record_id
        - criterion_id
        - side
        - region
        - site
        - state
        - assessed_by
        - assessed_at
    comment: ""
  - role: physician
    permission:
      check: {}
      set:
        organization_id: x-hasura-Organization-Id
      columns:
        - patient_record_id
        - criterion_id
        - side
        - region
        - site
        - state
        - assessed_by
        - assessed_at
    comment: ""
select_permissions:
  - role: org_admin
    permission:
      columns:
        - id
        - patient_record_id
        - organization_id
        - criterion_id
        - side
        - region
        - site
        - state
        - assessed_by
        - assessed_at
        - created_at
        - updated_at
      filter:
        organization_id:
          _eq: X-Hasura-Organization-Id
    comment: ""
  - role: physician
    permission:
      columns:
        - id
        - patient_record_id
        - organization_id
        - criterion_id
        - side
        - region
        - site
        - state
        - assessed_by
        - assessed_at
        - created_at
        - updated_at
      filter:
        organization_id:
          _eq: X-Hasura-Organization-Id
    comment: ""
  - role: receptionist
    permission:
      columns:
        - id
        - patient_record_id
        - organization_id
        - criterion_id
        - side
        - region
        - site
        - state
        - assessed_by
        - assessed_at
        - created_at
        - updated_at
      filter:
        organization_id:
          _eq: X-Hasura-Organization-Id
    comment: ""
update_permissions:
  - role: org_admin
    permission:
      columns:
        - state
        - assessed_by
        - assessed_at
      filter:
        organization_id:
          _eq: X-Hasura-Organization-Id
    comment: ""
  - role: physician
    permission:
      columns:
        - state
        - assessed_by
        - assessed_at
      filter:
        organization_id:
          _eq: X-Hasura-Organization-Id
    comment: ""
delete_permissions:
  - role: org_admin
    permission:
      filter:
        organization_id:
          _eq: X-Hasura-Organization-Id
    comment: ""
  - role: physician
    permission:
      filter:
        organization_id:
          _eq: X-Hasura-Organization-Id
    comment: ""
