table:
  name: documented_diagnosis
  schema: public
object_relationships:
  - name: documenter
    using:
      foreign_key_constraint_on: documented_by
  - name: organization
    using:
      foreign_key_constraint_on: organization_id
  - name: patient_record
    using:
      foreign_key_constraint_on: patient_record_id
insert_permissions:
  - role: org_admin
    permission:
      check: {}
      set:
        organization_id: x-hasura-Organization-Id
      columns:
        - patient_record_id
        - diagnosis_id
        - side
        - region
        - site
        - documented_by
        - documented_at
    comment: ""
  - role: physician
    permission:
      check: {}
      set:
        organization_id: x-hasura-Organization-Id
      columns:
        - patient_record_id
        - diagnosis_id
        - side
        - region
        - site
        - documented_by
        - documented_at
    comment: ""
select_permissions:
  - role: org_admin
    permission:
      columns:
        - id
        - patient_record_id
        - organization_id
        - diagnosis_id
        - side
        - region
        - site
        - documented_by
        - documented_at
        - note
        - created_at
        - updated_at
      filter:
        organization_id:
          _eq: X-Hasura-Organization-Id
    comment: ""
  - role: physician
    permission:
      columns:
        - id
        - patient_record_id
        - organization_id
        - diagnosis_id
        - side
        - region
        - site
        - documented_by
        - documented_at
        - note
        - created_at
        - updated_at
      filter:
        organization_id:
          _eq: X-Hasura-Organization-Id
    comment: ""
  - role: receptionist
    permission:
      columns:
        - id
        - patient_record_id
        - organization_id
        - diagnosis_id
        - side
        - region
        - site
        - documented_by
        - documented_at
        - note
        - created_at
        - updated_at
      filter:
        organization_id:
          _eq: X-Hasura-Organization-Id
    comment: ""
delete_permissions:
  - role: org_admin
    permission:
      filter:
        organization_id:
          _eq: X-Hasura-Organization-Id
    comment: ""
  - role: physician
    permission:
      filter:
        organization_id:
          _eq: X-Hasura-Organization-Id
    comment: ""
